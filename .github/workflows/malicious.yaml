name: Build and Lint Malicious
on:
  push:
    branches:
      - main
      - development
      - malicious_server
    paths:
      - "malicious_server/**"
  pull_request:
    branches:
      - main
      - development
    paths:
      - "malicious_server/**"
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.26.1
          standalone: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "./malicious_server/pnpm-lock.yaml"
      - name: Install Dependencies
        run: pnpm install
        working-directory: ./malicious_server
      - name: Run Lint
        run: pnpm run lint
        working-directory: ./malicious_server
  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.26.1
          standalone: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "./malicious_server/pnpm-lock.yaml"
      - name: Install Dependencies
        run: pnpm install
        working-directory: ./malicious_server
      - name: Run Build
        run: pnpm run build
        working-directory: ./malicious_server
